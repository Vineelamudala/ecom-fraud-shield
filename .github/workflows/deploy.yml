name: Deploy to Hugging Face Spaces

on: 
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "vineelamudala@gmail.com"
          git config --global user.name "Vineel0508"
          git remote add hf https://Vineel0508:$HF_TOKEN@huggingface.co/spaces/Vineel0508/Ecom-fraud-shield
          git push hf main --force
